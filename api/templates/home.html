<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OSMSG API</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 4rem auto; padding: 0 1.5rem; color: #222; }
    h1 { font-size: 1.5rem; margin-bottom: .25rem; }
    p { color: #555; margin: .5rem 0 1.5rem; }
    a { color: #3a7d44; text-decoration: none; }
    a:hover { text-decoration: underline; }
    ul { list-style: none; padding: 0; display: flex; flex-direction: column; gap: .5rem; }
    li { background: #f5f5f2; border-radius: 4px; padding: .6rem 1rem; font-size: .9rem; }
    code { font-family: monospace; color: #3a7d44; }
  </style>
</head>
<body>
  <h1>OSMSG</h1>
  <p>OpenStreetMap contributor stats API</p>
  <ul>
    <li><a href="/docs/swagger">API docs (Swagger)</a></li>
    <li><a href="/api/v1/stats"><code>GET /api/v1/stats</code></a> : contributor stats by date range</li>
    <li><a href="/health"><code>GET /health</code></a> : health check</li>
  </ul>
</body>
</html>
