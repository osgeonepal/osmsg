services:
  db:
    image: postgis/postgis:17-3.5-alpine
    platform: linux/amd64
    environment:
      POSTGRES_USER: osmsg
      POSTGRES_PASSWORD: osmsg
      POSTGRES_DB: osmsg
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${OSMSG_DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U osmsg -d osmsg"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      target: api
    environment:
      DATABASE_URL: postgresql://osmsg:osmsg@db:5432/osmsg
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app/api
    command: ["--reload"]
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      target: worker
    environment:
      DATABASE_URL: postgresql://osmsg:osmsg@db:5432/osmsg
      OSMSG_SCHEDULE: ${OSMSG_SCHEDULE:-*/2 * * * *}
      OSMSG_BOOTSTRAP: ${OSMSG_BOOTSTRAP:-hour}
      OSMSG_BOOTSTRAP_DAYS: ${OSMSG_BOOTSTRAP_DAYS:-}
      OSM_USERNAME: ${OSM_USERNAME:-}
      OSM_PASSWORD: ${OSM_PASSWORD:-}
      OSMSG_EXTRA_ARGS: ${OSMSG_EXTRA_ARGS:---name stats --output-dir /var/lib/osmsg --cache-dir /var/cache/osmsg --url minute --format psql --psql-dsn postgresql://osmsg:osmsg@db:5432/osmsg}
    volumes:
      - osmsg-data:/var/lib/osmsg
      - osmsg-cache:/var/cache/osmsg
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  osmsg-data:
  osmsg-cache:
